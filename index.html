<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Virág's Birthday Quest – Deluxe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-shell">
    <h1>Virág's Birthday Quest 🎂</h1>
    <p class="subtitle">Comic-Jump-n-Run zum Geburtstag</p>

    <div class="canvas-wrap">
      <canvas id="game" width="1400" height="720"></canvas>
    </div>

    <div class="mobile-controls">
      <button id="leftBtn" aria-label="Nach links">◀</button>
      <button id="jumpBtn" aria-label="Springen">▲</button>
      <button id="rightBtn" aria-label="Nach rechts">▶</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
